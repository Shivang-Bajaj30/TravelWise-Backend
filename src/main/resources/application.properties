spring.config.import=optional:file:.env[.properties]
spring.application.name=backend

# ---- JWT ----
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000


ai.primary-provider=gemini
ai.fallback-provider=groq
# ---- Gemini ----
gemini.api-key=${GEMINI_API_KEY}

# ---- Groq(Llama) ----
groq.api-key=${GROK_API_KEY}


# ---- CORS ----
cors.allowed-origins=${CORS_ORIGINS}

# ---- Server ----
server.port=${PORT}

spring.mongodb.uri=mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@travelwisecluster.2jbt20z.mongodb.net/demo?retryWrites=true&w=majority